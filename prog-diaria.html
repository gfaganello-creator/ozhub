<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programação Diária — Osasco Sporting</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --az: #46a2f7;
  --bk: #070E14;
  --c1: #0f1923;
  --c2: #1c2a38;
  --wh: #f0f4f8;
  --ww: #fff;
  --gr: #2ecc8e;
  --re: #ef4444;
  --ye: #f59e0b;
  --ts: #7a9bb5;
  --go: #ceaa78;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bk);
  color: var(--wh);
  font-family: 'Barlow', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(206,170,120,.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(46,204,142,.04) 0%, transparent 60%),
    linear-gradient(170deg, var(--bk) 0%, #081520 100%);
}
.grid {
  position: fixed; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(70,162,247,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(70,162,247,.025) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

.wrap {
  position: relative; z-index: 1;
  max-width: 600px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* HEADER */
.hdr {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 40px;
  padding-bottom: 28px;
  border-bottom: 1px solid rgba(206,170,120,.15);
  animation: fu .6s ease both;
}
.logo-wrap {
  width: 64px; height: 64px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: 0 0 0 2px rgba(206,170,120,.3), 0 0 20px rgba(206,170,120,.15);
  background: #1a6db5;
}
.logo-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
.hdr-club {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ww);
  line-height: 1.1;
}
.hdr-dept {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--go);
  margin-top: 3px;
}

/* TAG */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(206,170,120,.08);
  border: 1px solid rgba(206,170,120,.2);
  padding: 6px 14px;
  border-radius: 2px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--go);
  margin-bottom: 16px;
  animation: fu .6s ease .1s both;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--go); box-shadow: 0 0 6px var(--go); }

/* TITLE */
.title-block { margin-bottom: 28px; animation: fu .6s ease .15s both; }
.dia-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ts);
  margin-bottom: 4px;
}
.dia-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(40px, 10vw, 64px);
  line-height: .9;
  color: var(--ww);
  letter-spacing: 2px;
}
.dia-title span { color: var(--go); }
.dia-semana {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ts);
  margin-top: 6px;
}

/* TITULO DO DIA */
.titulo-dia {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--go);
  margin-bottom: 20px;
  animation: fu .6s ease .2s both;
}

/* TIMELINE */
.timeline { animation: fu .6s ease .25s both; }
.tl-item {
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 0;
  position: relative;
}
.tl-item::before {
  content: '';
  position: absolute;
  left: 26px;
  top: 32px;
  bottom: -4px;
  width: 1px;
  background: rgba(206,170,120,.1);
}
.tl-item:last-child::before { display: none; }
.tl-hora {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  color: var(--go);
  padding: 14px 0 14px;
  line-height: 1;
  position: relative;
  z-index: 1;
}
.tl-hora::after {
  content: '';
  position: absolute;
  right: -4px;
  top: 18px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--go);
  box-shadow: 0 0 6px rgba(206,170,120,.4);
}
.tl-content {
  padding: 10px 0 10px 20px;
  border-bottom: 1px solid rgba(70,162,247,.06);
}
.tl-item:last-child .tl-content { border-bottom: none; }
.tl-atividade {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .5px;
  color: var(--ww);
  line-height: 1.2;
}
.tl-local {
  font-size: 11px;
  color: var(--ts);
  margin-top: 3px;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* OBS */
.obs-block {
  margin-top: 20px;
  padding: 14px 16px;
  background: rgba(206,170,120,.04);
  border: 1px solid rgba(206,170,120,.1);
  border-left: 3px solid rgba(206,170,120,.4);
  border-radius: 0 3px 3px 0;
  animation: fu .6s ease .3s both;
}
.obs-lbl {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--ts);
  margin-bottom: 4px;
}
.obs-txt { font-size: 12px; color: var(--wh); font-style: italic; opacity: .8; }

/* STATS */
.stats {
  display: flex;
  gap: 2px;
  margin-top: 24px;
  background: rgba(206,170,120,.04);
  border: 1px solid rgba(206,170,120,.08);
  border-radius: 3px;
  overflow: hidden;
  animation: fu .6s ease .35s both;
}
.stat { flex: 1; padding: 16px 12px; text-align: center; }
.stat-v {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  line-height: 1;
  color: var(--ww);
  margin-bottom: 4px;
}
.stat-v.g { color: var(--go); }
.stat-v.b { color: var(--az); }
.stat-l {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ts);
}

/* FOOTER */
.footer {
  margin-top: 48px;
  padding-top: 20px;
  border-top: 1px solid rgba(206,170,120,.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  animation: fu .6s ease .4s both;
}
.footer-brand {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ts);
}
.footer-brand span { color: var(--go); }
.hub-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--go);
  color: var(--bk);
  padding: 10px 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 2px;
  transition: .2s;
}
.hub-btn:hover { background: #dfc090; transform: translateY(-1px); }

/* LOADING / ERROR */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 16px;
  animation: fu .5s ease both;
}
.spin {
  width: 40px; height: 40px;
  border: 2px solid rgba(206,170,120,.2);
  border-top-color: var(--go);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.loading-txt {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ts);
}
.error-block { text-align: center; padding: 48px 24px; animation: fu .5s ease both; }
.error-icon { font-size: 48px; margin-bottom: 16px; }
.error-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--ww); margin-bottom: 8px; }
.error-msg { font-size: 13px; color: var(--ts); }

@keyframes fu { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

@media (max-width: 500px) {
  .tl-hora { font-size: 15px; }
  .tl-atividade { font-size: 14px; }
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>

<div class="wrap">
  <div id="app">
    <div class="loading">
      <div class="spin"></div>
      <div class="loading-txt">Carregando programação...</div>
    </div>
  </div>
</div>

<script>
var SID = '1Fj8RhuKjicvVyF06CPJqF7kiKpEsquCKFSHX3qf3Pus';
var HUB_URL = 'https://gfaganello-creator.github.io/ozhub/';
var LOGO_URL = 'https://gfaganello-creator.github.io/ozhub/Logo_Oz_Estrela_Dourada_ID_8.png';

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function pcsv(line) {
  var r = [], c = '', q = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') {
      if (q && line[i+1] === '"') { c += '"'; i++; }
      else { q = !q; }
    } else if (ch === ',' && !q) { r.push(c); c = ''; }
    else { c += ch; }
  }
  r.push(c);
  return r;
}

function renderDiaria(prog) {
  var atividades = [];
  try { atividades = JSON.parse(prog['Atividades'] || '[]'); } catch(e) {}

  var dataBR  = (prog['Data BR'] || prog['Data Raw'] || '').replace(/^"|"$/g,'').trim();
  var diaSem  = (prog['Dia Semana'] || '').replace(/^"|"$/g,'').trim();
  var titulo  = (prog['Titulo'] || '').replace(/^"|"$/g,'').trim();
  var obs     = (prog['Obs'] || '').replace(/^"|"$/g,'').trim();
  var isEdit  = (prog['Status'] || '') === 'Editado';

  // Format date for big title: day highlighted
  var dataParts = dataBR.split('/');
  var diaTitulo = dataParts.length === 3
    ? '<span>' + dataParts[0] + '</span>/' + dataParts[1] + '/' + dataParts[2]
    : dataBR;

  // Build timeline rows
  var tlRows = atividades.map(function(a) {
    var localHtml = a.local
      ? '<div class="tl-local">📍 ' + a.local + '</div>'
      : '';
    return '<div class="tl-item">'
      + '<div class="tl-hora">' + (a.hora || '--:--') + '</div>'
      + '<div class="tl-content">'
        + '<div class="tl-atividade">' + (a.atividade || '') + '</div>'
        + localHtml
      + '</div>'
      + '</div>';
  }).join('');

  var obsHtml = obs
    ? '<div class="obs-block"><div class="obs-lbl">Observações</div><div class="obs-txt">' + obs + '</div></div>'
    : '';

  var tituloHtml = titulo
    ? '<div class="titulo-dia">' + titulo + '</div>'
    : '';

  var editBadge = isEdit
    ? '<div class="tag"><span style="color:var(--ye)">⚠</span> PROGRAMAÇÃO ALTERADA</div>'
    : '<div class="tag"><div class="dot"></div> PROGRAMAÇÃO DIÁRIA</div>';

  document.getElementById('app').innerHTML =
    '<div class="hdr">'
      + '<div class="logo-wrap"><img src="' + LOGO_URL + '" /></div>'
      + '<div>'
        + '<div class="hdr-club">Osasco Sporting</div>'
        + '<div class="hdr-dept">Programação · Hora a Hora</div>'
      + '</div>'
    + '</div>'

    + editBadge

    + '<div class="title-block">'
      + '<div class="dia-label">Programação de</div>'
      + '<div class="dia-title">' + diaTitulo + '</div>'
      + '<div class="dia-semana">' + diaSem + '</div>'
    + '</div>'

    + tituloHtml

    + '<div class="timeline">' + tlRows + '</div>'

    + obsHtml

    + '<div class="stats">'
      + '<div class="stat"><div class="stat-v g">' + atividades.length + '</div><div class="stat-l">Atividades</div></div>'
      + '<div class="stat"><div class="stat-v b">'
        + (atividades.length > 0 ? (atividades[0].hora || '--') : '--')
        + '</div><div class="stat-l">Início</div></div>'
      + '<div class="stat"><div class="stat-v">'
        + (atividades.length > 0 ? (atividades[atividades.length-1].hora || '--') : '--')
        + '</div><div class="stat-l">Última</div></div>'
    + '</div>'

    + '<div class="footer">'
      + '<div class="footer-brand">OZ <span>HUB</span> · Osasco Sporting</div>'
      + '<a href="' + HUB_URL + '" class="hub-btn">🔗 Acessar OZ HUB</a>'
    + '</div>';
}

function showError(msg) {
  document.getElementById('app').innerHTML =
    '<div class="error-block">'
      + '<div class="error-icon">⚠️</div>'
      + '<div class="error-title">Programação não encontrada</div>'
      + '<div class="error-msg">' + msg + '</div>'
    + '</div>';
}

function init() {
  var id = getParam('id');
  var data = getParam('data');

  var url = 'https://docs.google.com/spreadsheets/d/' + SID + '/gviz/tq?tqx=out:csv&sheet=ProgramacaoDiaria';
  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      if (!txt || txt.length < 10) { showError('Planilha vazia ou inacessível.'); return; }
      var lines = txt.split('\n');
      var hdrs = pcsv(lines[0]).map(function(h) { return h.replace(/^"|"$/g, '').trim(); });
      var rows = lines.slice(1).filter(function(l) { return l.trim(); }).map(function(l) {
        var vs = pcsv(l);
        var o = {};
        hdrs.forEach(function(h, i) { o[h] = (vs[i] || ''); });
        return o;
      }).filter(function(r) { return r['Data Raw'] && r['Data Raw'].trim(); });

      var prog = null;
      if (id)   prog = rows.find(function(r) { return r['ID'] === id; });
      if (!prog && data) prog = rows.find(function(r) { return r['Data Raw'] === data; });
      if (!prog) prog = rows[rows.length - 1]; // mais recente
      if (!prog) { showError('Nenhuma programação diária encontrada.'); return; }
      renderDiaria(prog);
    })
    .catch(function(err) { showError('Erro ao carregar dados: ' + err.message); });
}

init();
</script>
</body>
</html>
