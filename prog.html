<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programação Semanal — Osasco Sporting</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --az: #46a2f7;
  --bk: #070E14;
  --c1: #0f1923;
  --c2: #1c2a38;
  --wh: #f0f4f8;
  --ww: #fff;
  --gr: #2ecc8e;
  --re: #ef4444;
  --ye: #f59e0b;
  --ts: #7a9bb5;
  --go: #ceaa78;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bk);
  color: var(--wh);
  font-family: 'Barlow', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* BG */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(70,162,247,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(46,204,142,.04) 0%, transparent 60%),
    linear-gradient(170deg, var(--bk) 0%, #081520 100%);
}
.grid {
  position: fixed; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(70,162,247,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(70,162,247,.025) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

/* WRAP */
.wrap {
  position: relative; z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* HEADER */
.hdr {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 40px;
  padding-bottom: 28px;
  border-bottom: 1px solid rgba(70,162,247,.12);
  animation: fu .6s ease both;
}
.logo-wrap {
  width: 56px; height: 56px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: 0 0 0 2px rgba(206,170,120,.3), 0 0 20px rgba(70,162,247,.2);
  background: #1a6db5;
}
.logo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.logo-placeholder {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--c2);
  border: 2px solid rgba(206,170,120,.3);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  color: var(--go);
  flex-shrink: 0;
}
.hdr-info {}
.hdr-club {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ww);
  line-height: 1.1;
}
.hdr-dept {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--gr);
  margin-top: 3px;
}

/* TAG */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(70,162,247,.08);
  border: 1px solid rgba(70,162,247,.2);
  padding: 6px 14px;
  border-radius: 2px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--az);
  margin-bottom: 16px;
  animation: fu .6s ease .1s both;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gr); box-shadow: 0 0 6px var(--gr); }

/* TITLE */
.title-block { margin-bottom: 32px; animation: fu .6s ease .15s both; }
.semana-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ts);
  margin-bottom: 6px;
}
.semana-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(36px, 8vw, 56px);
  line-height: .9;
  color: var(--ww);
  letter-spacing: 2px;
}
.semana-title span { color: var(--az); }

/* INFO ROW */
.info-row {
  display: flex;
  gap: 24px;
  margin-bottom: 32px;
  flex-wrap: wrap;
  animation: fu .6s ease .2s both;
}
.info-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.info-lbl {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--ts);
}
.info-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--ww);
  letter-spacing: .5px;
}

/* TABLE */
.table-wrap { animation: fu .6s ease .25s both; }
.tbl-head {
  display: grid;
  grid-template-columns: 140px 90px 1fr 1fr;
  gap: 0;
  padding: 8px 16px;
  background: rgba(70,162,247,.06);
  border: 1px solid rgba(70,162,247,.1);
  border-radius: 3px 3px 0 0;
}
.tbl-head span {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--ts);
}
.tbl-row {
  display: grid;
  grid-template-columns: 140px 90px 1fr 1fr;
  gap: 0;
  padding: 14px 16px;
  border: 1px solid rgba(70,162,247,.07);
  border-top: none;
  transition: background .15s;
}
.tbl-row:hover { background: rgba(70,162,247,.03); }
.tbl-row:last-child { border-radius: 0 0 3px 3px; }
.tbl-row.alt { background: rgba(70,162,247,.02); }
.dia-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ww);
}
.dia-date {
  font-size: 12px;
  color: var(--ts);
  font-weight: 400;
}
.atividade {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .5px;
}
.tc { color: #2ecc8e; }
.ta { color: #1a9e6a; }
.jg { color: #46a2f7; }
.fo { color: #ef4444; }
.dp { color: #7a9bb5; }
.vg { color: #f7a846; }
.tr { color: #2ecc8e; }
.de { color: #7a9bb5; }

/* OBS */
.obs-block {
  margin-top: 20px;
  padding: 14px 16px;
  background: rgba(70,162,247,.04);
  border: 1px solid rgba(70,162,247,.1);
  border-left: 3px solid rgba(70,162,247,.4);
  border-radius: 0 3px 3px 0;
  animation: fu .6s ease .3s both;
}
.obs-lbl {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--ts);
  margin-bottom: 4px;
}
.obs-txt {
  font-size: 12px;
  color: var(--wh);
  font-style: italic;
  opacity: .8;
}

/* STATS */
.stats {
  display: flex;
  gap: 2px;
  margin-top: 24px;
  background: rgba(70,162,247,.04);
  border: 1px solid rgba(70,162,247,.08);
  border-radius: 3px;
  overflow: hidden;
  animation: fu .6s ease .35s both;
}
.stat {
  flex: 1;
  padding: 16px 12px;
  text-align: center;
}
.stat-v {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  line-height: 1;
  color: var(--ww);
  margin-bottom: 4px;
}
.stat-v.g { color: var(--gr); }
.stat-v.b { color: var(--az); }
.stat-v.r { color: var(--re); }
.stat-l {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ts);
}

/* FOOTER */
.footer {
  margin-top: 48px;
  padding-top: 20px;
  border-top: 1px solid rgba(70,162,247,.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: gap;
  animation: fu .6s ease .4s both;
}
.footer-brand {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ts);
}
.footer-brand span { color: var(--az); }
.hub-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--az);
  color: var(--bk);
  padding: 10px 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 2px;
  transition: .2s;
}
.hub-btn:hover { background: #6ab8fa; transform: translateY(-1px); }

/* LOADING / ERROR */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 16px;
  animation: fu .5s ease both;
}
.spin {
  width: 40px; height: 40px;
  border: 2px solid rgba(70,162,247,.2);
  border-top-color: var(--az);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.loading-txt {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ts);
}
.error-block {
  text-align: center;
  padding: 48px 24px;
  animation: fu .5s ease both;
}
.error-icon { font-size: 48px; margin-bottom: 16px; }
.error-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: var(--ww);
  margin-bottom: 8px;
}
.error-msg { font-size: 13px; color: var(--ts); }

@keyframes fu { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

@media (max-width: 500px) {
  .tbl-head, .tbl-row { grid-template-columns: 100px 72px 1fr 1fr; }
  .info-row { gap: 16px; }
  .stats { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>

<div class="wrap">
  <div id="app">
    <div class="loading">
      <div class="spin"></div>
      <div class="loading-txt">Carregando programação...</div>
    </div>
  </div>
</div>

<script>
var SID = '1Fj8RhuKjicvVyF06CPJqF7kiKpEsquCKFSHX3qf3Pus';
var HUB_URL = 'https://gfaganello-creator.github.io/ozhub/';
var LOGO_URL = 'https://gfaganello-creator.github.io/ozhub/Logo_Oz_Estrela_Dourada_ID_8.png';

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function corAtividade(v) {
  var mapa = {
    'Treino Campo': 'tc',
    'Treino Academia': 'ta',
    'Jogo': 'jg',
    'Folga': 'fo',
    'Descanso Programado': 'dp',
    'Viagem': 'vg',
    'Treino': 'tr',
    'Descanso': 'de'
  };
  return mapa[v] || 'dp';
}

function pcsv(line) {
  var r = [], c = '', q = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') { q = !q; }
    else if (ch === ',' && !q) { r.push(c.trim()); c = ''; }
    else { c += ch; }
  }
  r.push(c.trim());
  return r;
}

function renderProg(prog) {
  var dias = {};
  try { dias = JSON.parse(prog['Dias'] || '{}'); } catch(e) {}

  var diasNomes = ['Segunda','Terca','Quarta','Quinta','Sexta','Sabado','Domingo'];
  var diasPT = ['Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado','Domingo'];

  // Stats
  var treinos = 0, jogos = 0, folgas = 0;
  diasNomes.forEach(function(d) {
    var dia = dias[d] || {};
    if (dia.manha === 'Treino Campo' || dia.manha === 'Treino Academia' || dia.manha === 'Treino') treinos++;
    if (dia.tarde === 'Treino Campo' || dia.tarde === 'Treino Academia' || dia.tarde === 'Treino') treinos++;
    if (dia.manha === 'Jogo' || dia.tarde === 'Jogo') jogos++;
    if (dia.manha === 'Folga' && dia.tarde === 'Folga') folgas++;
  });

  // Semana display
  var primeiroData = '', ultimoData = '';
  diasNomes.forEach(function(d) {
    var dia = dias[d];
    if (dia && dia.data) {
      if (!primeiroData) primeiroData = dia.data;
      ultimoData = dia.data;
    }
  });

  var semanaRaw = prog['Semana Inicio Raw'] || '';
  var semanaFmt = prog['Semana Inicio'] || primeiroData || semanaRaw;

  // Title split
  var semParts = semanaFmt ? semanaFmt.split('/') : [];
  var semTitulo = semParts.length === 3
    ? '<span>' + semParts[0] + '/' + semParts[1] + '</span>/' + semParts[2]
    : semanaFmt;

  var isEdit = prog['Status'] === 'Alterado';

  var rows = diasNomes.map(function(d, i) {
    var dia = dias[d] || {};
    var manha = dia.manha || '—';
    var tarde = dia.tarde || '—';
    var alt = i % 2 === 1 ? ' alt' : '';
    return '<div class="tbl-row' + alt + '">'
      + '<div><div class="dia-name">' + diasPT[i] + '</div></div>'
      + '<div><div class="dia-date">' + (dia.data || '—') + '</div></div>'
      + '<div><div class="atividade ' + corAtividade(manha) + '">' + manha + '</div></div>'
      + '<div><div class="atividade ' + corAtividade(tarde) + '">' + tarde + '</div></div>'
      + '</div>';
  }).join('');

  var obsHtml = prog['Obs'] ? '<div class="obs-block"><div class="obs-lbl">Observações</div><div class="obs-txt">' + prog['Obs'] + '</div></div>' : '';

  var editBadge = isEdit
    ? '<div class="tag"><span style="color:var(--ye)">⚠</span> PROGRAMAÇÃO ALTERADA</div>'
    : '<div class="tag"><div class="dot"></div> PROGRAMAÇÃO SEMANAL</div>';

  document.getElementById('app').innerHTML =
    '<div class="hdr">'
      + '<div class="logo-wrap"><img src="' + LOGO_URL + '" style="width:100%;height:100%;object-fit:cover;display:block" /></div>'
      + '<div class="hdr-info">'
        + '<div class="hdr-club">Osasco Sporting</div>'
        + '<div class="hdr-dept">Departamento de Futebol · Categoria Profissional</div>'
      + '</div>'
    + '</div>'

    + editBadge

    + '<div class="title-block">'
      + '<div class="semana-label">Semana de</div>'
      + '<div class="semana-title">' + semTitulo + '</div>'
    + '</div>'

    + '<div class="info-row">'
      + '<div class="info-item"><div class="info-lbl">Local</div><div class="info-val">' + (prog['Local'] || 'Jose Liberatti') + '</div></div>'
      + '<div class="info-item"><div class="info-lbl">Manhã</div><div class="info-val">' + (prog['Horario Manha'] || '—') + '</div></div>'
      + '<div class="info-item"><div class="info-lbl">Tarde</div><div class="info-val">' + (prog['Horario Tarde'] || '—') + '</div></div>'
    + '</div>'

    + '<div class="table-wrap">'
      + '<div class="tbl-head"><span>Dia</span><span>Data</span><span>Manhã</span><span>Tarde</span></div>'
      + rows
    + '</div>'

    + obsHtml

    + '<div class="stats">'
      + '<div class="stat"><div class="stat-v g">' + treinos + '</div><div class="stat-l">Treinos</div></div>'
      + '<div class="stat"><div class="stat-v b">' + jogos + '</div><div class="stat-l">Jogos</div></div>'
      + '<div class="stat"><div class="stat-v r">' + folgas + '</div><div class="stat-l">Folgas</div></div>'
    + '</div>'

    + '<div class="footer">'
      + '<div class="footer-brand">OZ <span>HUB</span> · Osasco Sporting</div>'
      + '<a href="' + HUB_URL + '" class="hub-btn">🔗 Acessar OZ HUB</a>'
    + '</div>';
}

function showError(msg) {
  document.getElementById('app').innerHTML =
    '<div class="error-block">'
      + '<div class="error-icon">⚠️</div>'
      + '<div class="error-title">Programação não encontrada</div>'
      + '<div class="error-msg">' + msg + '</div>'
    + '</div>';
}

function init() {
  var id = getParam('id');
  if (!id) { showError('Nenhum ID de programação informado.'); return; }

  var url = 'https://docs.google.com/spreadsheets/d/' + SID + '/gviz/tq?tqx=out:csv&sheet=Programacao';
  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      if (!txt || txt.length < 10) { showError('Planilha vazia ou inacessível.'); return; }
      var lines = txt.split('\n');
      var hdrs = pcsv(lines[0]).map(function(h) { return h.replace(/^"|"$/g, '').trim(); });
      var rows = lines.slice(1).filter(function(l) { return l.trim(); }).map(function(l) {
        var vs = pcsv(l);
        var o = {};
        hdrs.forEach(function(h, i) { o[h] = (vs[i] || '').replace(/^"|"$/g, '').trim(); });
        return o;
      });
      var prog = rows.find(function(r) { return r['ID'] === id; });
      if (!prog) { showError('Programação com ID "' + id + '" não encontrada.'); return; }
      renderProg(prog);
    })
    .catch(function(err) { showError('Erro ao carregar dados: ' + err.message); });
}

init();
</script>
</body>
</html>'<img src="' + LOGO_URL + '" width="56" height="56" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block" />'PE html>

  line-height: .9;
  color: var(--ww);
  letter-spacing: 2px;
}
.semana-title span { color: var(--az); }

/* INFO ROW */
.info-row {
  display: flex;
  gap: 24px;
  margin-bottom: 32px;
  flex-wrap: wrap;
  animation: fu .6s ease .2s both;
}
.info-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.info-lbl {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--ts);
}
.info-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--ww);
  letter-spacing: .5px;
}

/* TABLE */
.table-wrap { animation: fu .6s ease .25s both; }
.tbl-head {
  display: grid;
  grid-template-columns: 140px 90px 1fr 1fr;
  gap: 0;
  padding: 8px 16px;
  background: rgba(70,162,247,.06);
  border: 1px solid rgba(70,162,247,.1);
  border-radius: 3px 3px 0 0;
}
.tbl-head span {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--ts);
}
.tbl-row {
  display: grid;
  grid-template-columns: 140px 90px 1fr 1fr;
  gap: 0;
  padding: 14px 16px;
  border: 1px solid rgba(70,162,247,.07);
  border-top: none;
  transition: background .15s;
}
.tbl-row:hover { background: rgba(70,162,247,.03); }
.tbl-row:last-child { border-radius: 0 0 3px 3px; }
.tbl-row.alt { background: rgba(70,162,247,.02); }
.dia-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--ww);
}
.dia-date {
  font-size: 12px;
  color: var(--ts);
  font-weight: 400;
}
.atividade {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .5px;
}
.tc { color: #2ecc8e; }
.ta { color: #1a9e6a; }
.jg { color: #46a2f7; }
.fo { color: #ef4444; }
.dp { color: #7a9bb5; }
.vg { color: #f7a846; }
.tr { color: #2ecc8e; }
.de { color: #7a9bb5; }

/* OBS */
.obs-block {
  margin-top: 20px;
  padding: 14px 16px;
  background: rgba(70,162,247,.04);
  border: 1px solid rgba(70,162,247,.1);
  border-left: 3px solid rgba(70,162,247,.4);
  border-radius: 0 3px 3px 0;
  animation: fu .6s ease .3s both;
}
.obs-lbl {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--ts);
  margin-bottom: 4px;
}
.obs-txt {
  font-size: 12px;
  color: var(--wh);
  font-style: italic;
  opacity: .8;
}

/* STATS */
.stats {
  display: flex;
  gap: 2px;
  margin-top: 24px;
  background: rgba(70,162,247,.04);
  border: 1px solid rgba(70,162,247,.08);
  border-radius: 3px;
  overflow: hidden;
  animation: fu .6s ease .35s both;
}
.stat {
  flex: 1;
  padding: 16px 12px;
  text-align: center;
}
.stat-v {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  line-height: 1;
  color: var(--ww);
  margin-bottom: 4px;
}
.stat-v.g { color: var(--gr); }
.stat-v.b { color: var(--az); }
.stat-v.r { color: var(--re); }
.stat-l {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ts);
}

/* FOOTER */
.footer {
  margin-top: 48px;
  padding-top: 20px;
  border-top: 1px solid rgba(70,162,247,.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: gap;
  animation: fu .6s ease .4s both;
}
.footer-brand {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ts);
}
.footer-brand span { color: var(--az); }
.hub-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--az);
  color: var(--bk);
  padding: 10px 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 2px;
  transition: .2s;
}
.hub-btn:hover { background: #6ab8fa; transform: translateY(-1px); }

/* LOADING / ERROR */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 16px;
  animation: fu .5s ease both;
}
.spin {
  width: 40px; height: 40px;
  border: 2px solid rgba(70,162,247,.2);
  border-top-color: var(--az);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.loading-txt {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ts);
}
.error-block {
  text-align: center;
  padding: 48px 24px;
  animation: fu .5s ease both;
}
.error-icon { font-size: 48px; margin-bottom: 16px; }
.error-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  color: var(--ww);
  margin-bottom: 8px;
}
.error-msg { font-size: 13px; color: var(--ts); }

@keyframes fu { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

@media (max-width: 500px) {
  .tbl-head, .tbl-row { grid-template-columns: 100px 72px 1fr 1fr; }
  .info-row { gap: 16px; }
  .stats { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>

<div class="wrap">
  <div id="app">
    <div class="loading">
      <div class="spin"></div>
      <div class="loading-txt">Carregando programação...</div>
    </div>
  </div>
</div>

<script>
var SID = '1Fj8RhuKjicvVyF06CPJqF7kiKpEsquCKFSHX3qf3Pus';
var HUB_URL = 'https://gfaganello-creator.github.io/ozhub/';
var LOGO_URL = 'https://gfaganello-creator.github.io/ozhub/Logo_Oz_Estrela_Dourada_ID_8.png';

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function corAtividade(v) {
  var mapa = {
    'Treino Campo': 'tc',
    'Treino Academia': 'ta',
    'Jogo': 'jg',
    'Folga': 'fo',
    'Descanso Programado': 'dp',
    'Viagem': 'vg',
    'Treino': 'tr',
    'Descanso': 'de'
  };
  return mapa[v] || 'dp';
}

function pcsv(line) {
  var r = [], c = '', q = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') { q = !q; }
    else if (ch === ',' && !q) { r.push(c.trim()); c = ''; }
    else { c += ch; }
  }
  r.push(c.trim());
  return r;
}

function renderProg(prog) {
  var dias = {};
  try { dias = JSON.parse(prog['Dias'] || '{}'); } catch(e) {}

  var diasNomes = ['Segunda','Terca','Quarta','Quinta','Sexta','Sabado','Domingo'];
  var diasPT = ['Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado','Domingo'];

  // Stats
  var treinos = 0, jogos = 0, folgas = 0;
  diasNomes.forEach(function(d) {
    var dia = dias[d] || {};
    if (dia.manha === 'Treino Campo' || dia.manha === 'Treino Academia' || dia.manha === 'Treino') treinos++;
    if (dia.tarde === 'Treino Campo' || dia.tarde === 'Treino Academia' || dia.tarde === 'Treino') treinos++;
    if (dia.manha === 'Jogo' || dia.tarde === 'Jogo') jogos++;
    if (dia.manha === 'Folga' && dia.tarde === 'Folga') folgas++;
  });

  // Semana display
  var primeiroData = '', ultimoData = '';
  diasNomes.forEach(function(d) {
    var dia = dias[d];
    if (dia && dia.data) {
      if (!primeiroData) primeiroData = dia.data;
      ultimoData = dia.data;
    }
  });

  var semanaRaw = prog['Semana Inicio Raw'] || '';
  var semanaFmt = prog['Semana Inicio'] || primeiroData || semanaRaw;

  // Title split
  var semParts = semanaFmt ? semanaFmt.split('/') : [];
  var semTitulo = semParts.length === 3
    ? '<span>' + semParts[0] + '/' + semParts[1] + '</span>/' + semParts[2]
    : semanaFmt;

  var isEdit = prog['Status'] === 'Alterado';

  var rows = diasNomes.map(function(d, i) {
    var dia = dias[d] || {};
    var manha = dia.manha || '—';
    var tarde = dia.tarde || '—';
    var alt = i % 2 === 1 ? ' alt' : '';
    return '<div class="tbl-row' + alt + '">'
      + '<div><div class="dia-name">' + diasPT[i] + '</div></div>'
      + '<div><div class="dia-date">' + (dia.data || '—') + '</div></div>'
      + '<div><div class="atividade ' + corAtividade(manha) + '">' + manha + '</div></div>'
      + '<div><div class="atividade ' + corAtividade(tarde) + '">' + tarde + '</div></div>'
      + '</div>';
  }).join('');

  var obsHtml = prog['Obs'] ? '<div class="obs-block"><div class="obs-lbl">Observações</div><div class="obs-txt">' + prog['Obs'] + '</div></div>' : '';

  var editBadge = isEdit
    ? '<div class="tag"><span style="color:var(--ye)">⚠</span> PROGRAMAÇÃO ALTERADA</div>'
    : '<div class="tag"><div class="dot"></div> PROGRAMAÇÃO SEMANAL</div>';

  document.getElementById('app').innerHTML =
    '<div class="hdr">'
      + '<div class="logo-wrap"><img src="' + LOGO_URL + '" style="width:100%;height:100%;object-fit:cover;display:block" /></div>'
      + '<div class="hdr-info">'
        + '<div class="hdr-club">Osasco Sporting</div>'
        + '<div class="hdr-dept">Departamento de Futebol · Categoria Profissional</div>'
      + '</div>'
    + '</div>'

    + editBadge

    + '<div class="title-block">'
      + '<div class="semana-label">Semana de</div>'
      + '<div class="semana-title">' + semTitulo + '</div>'
    + '</div>'

    + '<div class="info-row">'
      + '<div class="info-item"><div class="info-lbl">Local</div><div class="info-val">' + (prog['Local'] || 'Jose Liberatti') + '</div></div>'
      + '<div class="info-item"><div class="info-lbl">Manhã</div><div class="info-val">' + (prog['Horario Manha'] || '—') + '</div></div>'
      + '<div class="info-item"><div class="info-lbl">Tarde</div><div class="info-val">' + (prog['Horario Tarde'] || '—') + '</div></div>'
    + '</div>'

    + '<div class="table-wrap">'
      + '<div class="tbl-head"><span>Dia</span><span>Data</span><span>Manhã</span><span>Tarde</span></div>'
      + rows
    + '</div>'

    + obsHtml

    + '<div class="stats">'
      + '<div class="stat"><div class="stat-v g">' + treinos + '</div><div class="stat-l">Treinos</div></div>'
      + '<div class="stat"><div class="stat-v b">' + jogos + '</div><div class="stat-l">Jogos</div></div>'
      + '<div class="stat"><div class="stat-v r">' + folgas + '</div><div class="stat-l">Folgas</div></div>'
    + '</div>'

    + '<div class="footer">'
      + '<div class="footer-brand">OZ <span>HUB</span> · Osasco Sporting</div>'
      + '<a href="' + HUB_URL + '" class="hub-btn">🔗 Acessar OZ HUB</a>'
    + '</div>';
}

function showError(msg) {
  document.getElementById('app').innerHTML =
    '<div class="error-block">'
      + '<div class="error-icon">⚠️</div>'
      + '<div class="error-title">Programação não encontrada</div>'
      + '<div class="error-msg">' + msg + '</div>'
    + '</div>';
}

function init() {
  var id = getParam('id');
  if (!id) { showError('Nenhum ID de programação informado.'); return; }

  var url = 'https://docs.google.com/spreadsheets/d/' + SID + '/gviz/tq?tqx=out:csv&sheet=Programacao';
  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      if (!txt || txt.length < 10) { showError('Planilha vazia ou inacessível.'); return; }
      var lines = txt.split('\n');
      var hdrs = pcsv(lines[0]).map(function(h) { return h.replace(/^"|"$/g, '').trim(); });
      var rows = lines.slice(1).filter(function(l) { return l.trim(); }).map(function(l) {
        var vs = pcsv(l);
        var o = {};
        hdrs.forEach(function(h, i) { o[h] = (vs[i] || '').replace(/^"|"$/g, '').trim(); });
        return o;
      });
      var prog = rows.find(function(r) { return r['ID'] === id; });
      if (!prog) { showError('Programação com ID "' + id + '" não encontrada.'); return; }
      renderProg(prog);
    })
    .catch(function(err) { showError('Erro ao carregar dados: ' + err.message); });
}

init();
</script>
</body>
</html>
